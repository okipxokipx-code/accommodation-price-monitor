<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>전국 숙박 객단가 모니터링</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0f1117; --card: #1a1d27; --card2: #22263a;
    --border: #2e3250; --accent: #4f6ef7; --accent2: #f76f4f;
    --text: #e8eaf6; --muted: #7986cb; --green: #4caf50; --red: #f44336;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; }

  header {
    background: var(--card); border-bottom: 1px solid var(--border);
    padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px;
  }
  header h1 { font-size: 1rem; font-weight: 700; }
  header h1 span { color: var(--accent); }
  .update-info { font-size: 0.75rem; color: var(--muted); }
  .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; background: var(--green); vertical-align: middle; }
  .status-dot.stale { background: var(--red); animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:.4} }

  .container { max-width: 1280px; margin: 0 auto; padding: 16px; }
  .offline-banner { background:#3a1a1a; border:1px solid var(--red); border-radius:8px; padding:10px 14px; margin-bottom:12px; font-size:.85rem; color:#ff7070; display:none; }

  /* 숙박 유형 탭 */
  .type-tabs { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:14px; }
  .type-tab { padding:7px 18px; border-radius:24px; border:1px solid var(--border); background:var(--card); cursor:pointer; font-size:.88rem; color:var(--muted); transition:all .2s; }
  .type-tab.active { background:var(--accent); border-color:var(--accent); color:#fff; font-weight:600; }

  /* 플랫폼 탭 */
  .plat-tabs { display:flex; gap:5px; margin-bottom:14px; }
  .plat-tab { padding:4px 13px; border-radius:14px; border:1px solid var(--border); background:transparent; cursor:pointer; font-size:.8rem; color:var(--muted); transition:all .2s; }
  .plat-tab.active { border-color:var(--text); color:var(--text); }

  /* 지역 선택 */
  .region-section { margin-bottom:16px; }
  .region-label { font-size:.75rem; color:var(--muted); margin-bottom:8px; font-weight:600; letter-spacing:.05em; }
  .region-pills { display:flex; flex-wrap:wrap; gap:5px; }
  .region-pill { padding:4px 12px; border-radius:20px; border:1px solid var(--border); background:var(--card); cursor:pointer; font-size:.78rem; color:var(--muted); transition:all .15s; white-space:nowrap; }
  .region-pill:hover { border-color:var(--accent); color:var(--text); }
  .region-pill.active { background:var(--accent); border-color:var(--accent); color:#fff; font-weight:600; }

  /* 요약 카드 */
  .stats-row { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:10px; margin-bottom:18px; }
  .stat-card { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:14px 16px; }
  .stat-label { font-size:.72rem; color:var(--muted); margin-bottom:5px; }
  .stat-value { font-size:1.4rem; font-weight:700; }
  .stat-sub { font-size:.7rem; color:var(--muted); margin-top:3px; }
  .stat-card.hl { border-color:var(--accent); }
  .stat-card.hl .stat-value { color:var(--accent); }

  /* 차트 */
  .chart-panel { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:16px; margin-bottom:16px; }
  .panel-title { font-size:.8rem; font-weight:600; color:var(--muted); margin-bottom:12px; }
  .chart-wrap { position:relative; height:200px; }

  /* 2컬럼 */
  .two-col { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:16px; }
  @media(max-width:600px){ .two-col{grid-template-columns:1fr;} }
  .panel { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:16px; }

  /* 도시 아이템 */
  .city-item { display:flex; align-items:center; justify-content:space-between; padding:6px 0; border-bottom:1px solid var(--border); }
  .city-item:last-child { border-bottom:none; }
  .city-name { font-size:.85rem; }
  .city-avg { font-size:.88rem; font-weight:600; color:var(--accent); }
  .city-count { font-size:.7rem; color:var(--muted); }
  .rank { font-size:.7rem; color:var(--muted); width:18px; flex-shrink:0; }

  /* 전국 도시 그리드 */
  .city-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(130px,1fr)); gap:7px; margin-top:10px; }
  .city-grid-card { background:var(--card2); border:1px solid var(--border); border-radius:8px; padding:9px 11px; cursor:pointer; transition:border-color .15s; }
  .city-grid-card:hover { border-color:var(--accent); }
  .city-grid-card.active { border-color:var(--accent); background:rgba(79,110,247,.12); }
  .city-grid-name { font-size:.74rem; color:var(--muted); margin-bottom:3px; }
  .city-grid-avg { font-size:.95rem; font-weight:700; }
  .city-grid-count { font-size:.68rem; color:var(--muted); }

  /* 도시 상세 패널 */
  .city-detail { background:var(--card); border:1px solid var(--accent); border-radius:10px; padding:16px; margin-bottom:16px; }
  .city-detail-title { font-size:.9rem; font-weight:700; color:var(--accent); margin-bottom:12px; }
  .city-plat-row { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:14px; }
  .city-plat-card { flex:1; min-width:120px; background:var(--card2); border:1px solid var(--border); border-radius:8px; padding:10px 12px; }
  .city-plat-name { font-size:.72rem; color:var(--muted); margin-bottom:4px; }
  .city-plat-avg { font-size:1.1rem; font-weight:700; }
  .city-plat-cnt { font-size:.7rem; color:var(--muted); }

  .loading { text-align:center; padding:50px; color:var(--muted); font-size:.9rem; }
</style>
</head>
<body>

<header>
  <h1>🏨 전국 숙박 <span>객단가</span> 모니터링</h1>
  <div class="update-info">
    <span class="status-dot" id="statusDot"></span>
    <span id="updateTime">로딩 중...</span>
    &nbsp;·&nbsp; 매 시간 자동 갱신
  </div>
</header>

<div class="container">
  <div class="offline-banner" id="offlineBanner">⚠️ 마지막 갱신이 2시간 이상 지났습니다.</div>
  <div id="mainContent" class="loading">데이터를 불러오는 중...</div>
</div>

<script>
const DATA_URL = 'https://raw.githubusercontent.com/okipxokipx-code/accommodation-price-monitor/main/data-export/latest.json';
const TYPE_LABELS = { motel:'모텔', hotel:'호텔', pension:'펜션', guesthouse:'게스트하우스' };
const PLAT_LABELS = { all:'전체', yanolja:'야놀자', yeogi:'여기어때' };
const CHART_COLORS = {
  yanolja:{ line:'#4f6ef7', fill:'rgba(79,110,247,.12)' },
  yeogi:  { line:'#f76f4f', fill:'rgba(247,111,79,.12)' },
  all:    { line:'#7986cb', fill:'rgba(121,134,203,.12)' },
};

let gData=null, gType='motel', gPlat='all', gCity='전국', trendChart=null;

const won = v => v ? Math.round(v).toLocaleString('ko-KR')+'원' : '-';
const cnt = v => v ? v.toLocaleString('ko-KR')+'건' : '-';

// ── 메인 렌더 ────────────────────────────────────────────────
function render() {
  if (!gData) return;
  const d = gData.types[gType];
  const isNation = (gCity === '전국');
  const cityObj = isNation ? null : d.cities.find(c => c.city === gCity);

  // 현재 보여줄 통계 (전국 vs 도시)
  const stats = isNation ? d.platforms[gPlat] : getCityStats(cityObj);
  const trend  = isNation ? d.hourlyTrend : (cityObj ? cityObj.trend : []);

  document.getElementById('mainContent').innerHTML = `
    <!-- 숙박 유형 탭 -->
    <div class="type-tabs">
      ${Object.entries(TYPE_LABELS).map(([k,v])=>
        `<div class="type-tab ${k===gType?'active':''}" onclick="setType('${k}')">${v}</div>`
      ).join('')}
    </div>

    <!-- 플랫폼 탭 -->
    <div class="plat-tabs">
      ${Object.entries(PLAT_LABELS).map(([k,v])=>
        `<div class="plat-tab ${k===gPlat?'active':''}" onclick="setPlat('${k}')">${v}</div>`
      ).join('')}
    </div>

    <!-- 지역 선택 -->
    <div class="region-section">
      <div class="region-label">📍 지역 선택</div>
      <div class="region-pills">
        <div class="region-pill ${'전국'===gCity?'active':''}" onclick="setCity('전국')">전국 전체</div>
        ${d.cities.map(c=>
          `<div class="region-pill ${c.city===gCity?'active':''}" onclick="setCity('${c.city}')">${c.city}</div>`
        ).join('')}
      </div>
    </div>

    <!-- 요약 카드 -->
    <div class="stats-row">
      <div class="stat-card hl">
        <div class="stat-label">평균 객단가</div>
        <div class="stat-value">${won(stats?.avg)}</div>
        <div class="stat-sub">수집 ${cnt(stats?.count)}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">최저가</div>
        <div class="stat-value" style="color:var(--green);font-size:1.2rem">${won(stats?.min)}</div>
        <div class="stat-sub">${isNation?'전국':'해당 지역'} 기준</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">최고가</div>
        <div class="stat-value" style="color:var(--red);font-size:1.2rem">${won(stats?.max)}</div>
        <div class="stat-sub">${isNation?'전국':'해당 지역'} 기준</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">${isNation?'수집 지역 수':'지역'}</div>
        <div class="stat-value" style="font-size:1.2rem">${isNation ? d.cities.length+'<span style="font-size:.85rem;color:var(--muted)">개</span>' : gCity}</div>
        <div class="stat-sub">최근 2시간 배치</div>
      </div>
    </div>

    <!-- 도시 상세 (도시 선택 시) -->
    ${!isNation && cityObj ? renderCityDetail(cityObj) : ''}

    <!-- 트렌드 차트 -->
    <div class="chart-panel">
      <div class="panel-title">📈 24시간 객단가 트렌드 ${!isNation?'— '+gCity+' (지역별)':'— 전국'}</div>
      <div class="chart-wrap"><canvas id="trendChart"></canvas></div>
    </div>

    <!-- 비싼/저렴한 지역 (전국 뷰에서만) -->
    ${isNation ? `
    <div class="two-col">
      <div class="panel">
        <div class="panel-title">💰 비싼 지역 TOP 10</div>
        ${topCities(d.cities,'desc')}
      </div>
      <div class="panel">
        <div class="panel-title">💸 저렴한 지역 TOP 10</div>
        ${topCities(d.cities,'asc')}
      </div>
    </div>` : ''}

    <!-- 전국 도시 그리드 -->
    <div class="panel" style="margin-bottom:20px">
      <div class="panel-title">🗺️ 전국 도시별 평균 — ${TYPE_LABELS[gType]} (클릭하면 상세보기)</div>
      <div class="city-grid">
        <div class="city-grid-card ${'전국'===gCity?'active':''}" onclick="setCity('전국')">
          <div class="city-grid-name">📊 전국 전체</div>
          <div class="city-grid-avg">${won(d.platforms.all?.avg)}</div>
          <div class="city-grid-count">${cnt(d.platforms.all?.count)}</div>
        </div>
        ${d.cities.map(c=>`
          <div class="city-grid-card ${c.city===gCity?'active':''}" onclick="setCity('${c.city}')">
            <div class="city-grid-name">${c.city}</div>
            <div class="city-grid-avg">${won(c.avg)}</div>
            <div class="city-grid-count">${cnt(c.count)}</div>
          </div>
        `).join('')}
      </div>
    </div>
  `;

  renderChart(trend);
}

function getCityStats(cityObj) {
  if (!cityObj) return { avg:null, count:0, min:null, max:null };
  // 플랫폼 필터 적용
  if (gPlat === 'all') return cityObj;
  const p = cityObj.platforms?.[gPlat];
  return { avg: p?.avg, count: p?.count, min: cityObj.min, max: cityObj.max };
}

function renderCityDetail(cityObj) {
  const plats = cityObj.platforms || {};
  return `
    <div class="city-detail">
      <div class="city-detail-title">📍 ${cityObj.city} 상세</div>
      <div class="city-plat-row">
        <div class="city-plat-card">
          <div class="city-plat-name">전체 평균</div>
          <div class="city-plat-avg" style="color:var(--accent)">${won(cityObj.avg)}</div>
          <div class="city-plat-cnt">${cnt(cityObj.count)}</div>
        </div>
        ${plats.yanolja ? `
        <div class="city-plat-card">
          <div class="city-plat-name">야놀자</div>
          <div class="city-plat-avg" style="color:#4f6ef7">${won(plats.yanolja.avg)}</div>
          <div class="city-plat-cnt">${cnt(plats.yanolja.count)}</div>
        </div>` : ''}
        ${plats.yeogi ? `
        <div class="city-plat-card">
          <div class="city-plat-name">여기어때</div>
          <div class="city-plat-avg" style="color:#f76f4f">${won(plats.yeogi.avg)}</div>
          <div class="city-plat-cnt">${cnt(plats.yeogi.count)}</div>
        </div>` : ''}
        <div class="city-plat-card">
          <div class="city-plat-name">가격 범위</div>
          <div class="city-plat-avg" style="font-size:.9rem;color:var(--green)">${won(cityObj.min)}</div>
          <div class="city-plat-cnt">~ ${won(cityObj.max)}</div>
        </div>
      </div>
    </div>
  `;
}

function topCities(cities, dir) {
  const sorted = [...cities].filter(c=>c.avg).sort((a,b)=>dir==='desc'?b.avg-a.avg:a.avg-b.avg).slice(0,10);
  if (!sorted.length) return '<div style="color:var(--muted);font-size:.83rem;padding:6px 0">데이터 없음</div>';
  return sorted.map((c,i)=>`
    <div class="city-item" onclick="setCity('${c.city}')" style="cursor:pointer">
      <div style="display:flex;align-items:center;gap:5px">
        <span class="rank">${i+1}</span>
        <span class="city-name">${c.city}</span>
      </div>
      <div style="text-align:right">
        <div class="city-avg">${won(c.avg)}</div>
        <div class="city-count">${cnt(c.count)}</div>
      </div>
    </div>
  `).join('');
}

function renderChart(rows) {
  const ctx = document.getElementById('trendChart');
  if (!ctx) return;
  if (trendChart) { trendChart.destroy(); trendChart = null; }
  if (!rows || !rows.length) {
    ctx.parentElement.innerHTML += '<div style="text-align:center;padding:30px;color:var(--muted);font-size:.83rem">트렌드 데이터 없음</div>';
    return;
  }

  const platMap = {};
  rows.forEach(r => {
    if (!platMap[r.platform]) platMap[r.platform] = {};
    platMap[r.platform][r.hour] = r.avg;
  });
  const allHours = [...new Set(rows.map(r=>r.hour))].sort();
  const labels = allHours.map(h => h.slice(11,16));

  const datasets = Object.keys(platMap).map(plat => ({
    label: PLAT_LABELS[plat] || plat,
    data: allHours.map(h => platMap[plat][h] || null),
    borderColor: CHART_COLORS[plat]?.line || '#7986cb',
    backgroundColor: CHART_COLORS[plat]?.fill || 'rgba(121,134,203,.1)',
    fill: true, tension: 0.4, pointRadius: 3, spanGaps: false,
  }));

  trendChart = new Chart(ctx, {
    type: 'line',
    data: { labels, datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { labels: { color:'#7986cb', font:{size:11} } },
        tooltip: { callbacks: { label: c => ` ${c.dataset.label}: ${won(c.raw)}` } }
      },
      scales: {
        x: { ticks:{color:'#7986cb',font:{size:10}}, grid:{color:'#2e3250'} },
        y: { ticks:{color:'#7986cb',font:{size:10},callback:v=>(v/10000).toFixed(0)+'만'}, grid:{color:'#2e3250'} }
      }
    }
  });
}

function setType(t) { gType=t; gCity='전국'; render(); }
function setPlat(p) { gPlat=p; render(); }
function setCity(c) { gCity=c; render(); }

// ── 데이터 로드 ──────────────────────────────────────────────
async function loadData() {
  try {
    const res = await fetch(DATA_URL + '?t=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    gData = await res.json();

    const updatedAt = new Date(gData.updatedAt);
    const diffMin = Math.round((Date.now() - updatedAt) / 60000);
    const timeStr = updatedAt.toLocaleString('ko-KR', { timeZone:'Asia/Seoul', month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit' });

    if (diffMin > 120) {
      document.getElementById('statusDot').classList.add('stale');
      document.getElementById('offlineBanner').style.display = 'block';
    } else {
      document.getElementById('statusDot').classList.remove('stale');
      document.getElementById('offlineBanner').style.display = 'none';
    }
    document.getElementById('updateTime').textContent =
      `마지막 갱신: ${timeStr} (${diffMin<60?diffMin+'분 전':Math.floor(diffMin/60)+'시간 전'})`;

    render();
  } catch(err) {
    document.getElementById('mainContent').innerHTML = `
      <div style="text-align:center;padding:50px;color:var(--red)">
        <div style="font-size:1.8rem;margin-bottom:10px">⚠️</div>
        <div>데이터를 불러오지 못했습니다</div>
        <div style="font-size:.78rem;color:var(--muted);margin-top:6px">${err.message}</div>
        <button onclick="loadData()" style="margin-top:14px;padding:7px 18px;background:var(--accent);color:#fff;border:none;border-radius:8px;cursor:pointer">다시 시도</button>
      </div>`;
  }
}

loadData();
setInterval(loadData, 5 * 60 * 1000);
</script>
</body>
</html>
