<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>전국 숙박 객단가 모니터링</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg:#0f1117; --card:#1a1d27; --card2:#22263a;
    --border:#2e3250; --accent:#4f6ef7; --accent2:#f76f4f;
    --text:#e8eaf6; --muted:#7986cb; --green:#4caf50; --red:#f44336;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;}

  header{background:var(--card);border-bottom:1px solid var(--border);padding:13px 18px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px;}
  header h1{font-size:.98rem;font-weight:700;}
  header h1 span{color:var(--accent);}
  .update-info{font-size:.73rem;color:var(--muted);}
  .status-dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:4px;background:var(--green);vertical-align:middle;}
  .status-dot.stale{background:var(--red);animation:pulse 1.5s infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

  .container{max-width:1300px;margin:0 auto;padding:14px 14px;}
  .offline-banner{background:#3a1a1a;border:1px solid var(--red);border-radius:8px;padding:9px 13px;margin-bottom:11px;font-size:.82rem;color:#ff7070;display:none;}

  /* 숙박 유형 탭 */
  .type-tabs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px;}
  .type-tab{padding:6px 16px;border-radius:22px;border:1px solid var(--border);background:var(--card);cursor:pointer;font-size:.85rem;color:var(--muted);transition:all .18s;}
  .type-tab.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600;}

  /* 플랫폼 탭 */
  .plat-tabs{display:flex;gap:5px;margin-bottom:14px;}
  .plat-tab{padding:4px 12px;border-radius:13px;border:1px solid var(--border);background:transparent;cursor:pointer;font-size:.78rem;color:var(--muted);transition:all .15s;}
  .plat-tab.active{border-color:var(--text);color:var(--text);}

  /* 요약 카드 */
  .stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:9px;margin-bottom:16px;}
  .stat-card{background:var(--card);border:1px solid var(--border);border-radius:9px;padding:12px 14px;}
  .stat-label{font-size:.7rem;color:var(--muted);margin-bottom:4px;}
  .stat-value{font-size:1.3rem;font-weight:700;}
  .stat-sub{font-size:.68rem;color:var(--muted);margin-top:3px;}
  .stat-card.hl{border-color:var(--accent);}
  .stat-card.hl .stat-value{color:var(--accent);}

  /* ── 지역 선택 패널 ── */
  .region-panel{display:grid;grid-template-columns:110px 1fr;background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:16px;min-height:260px;}

  /* 좌측 시/도 목록 */
  .city-list{background:var(--card2);border-right:1px solid var(--border);padding:6px 0;overflow-y:auto;max-height:320px;}
  .city-list-item{padding:10px 14px;font-size:.85rem;color:var(--muted);cursor:pointer;border-left:3px solid transparent;transition:all .13s;white-space:nowrap;}
  .city-list-item:hover{color:var(--text);background:rgba(79,110,247,.08);}
  .city-list-item.active{color:var(--accent);font-weight:700;border-left-color:var(--accent);background:rgba(79,110,247,.1);}

  /* 우측 구 단위 목록 */
  .district-panel{padding:10px 12px;overflow-y:auto;max-height:320px;}
  .district-header{font-size:.72rem;color:var(--muted);font-weight:600;margin-bottom:8px;letter-spacing:.04em;}

  .district-item{display:flex;align-items:center;justify-content:space-between;padding:9px 10px;border-radius:7px;cursor:pointer;border:1px solid transparent;margin-bottom:5px;transition:all .13s;}
  .district-item:hover{background:rgba(79,110,247,.07);border-color:var(--border);}
  .district-item.active{background:rgba(79,110,247,.15);border-color:var(--accent);}
  .district-name{font-size:.85rem;}
  .district-name small{display:block;font-size:.7rem;color:var(--muted);margin-top:1px;}
  .district-avg{font-size:.9rem;font-weight:700;color:var(--accent);text-align:right;}
  .district-count{font-size:.68rem;color:var(--muted);text-align:right;}

  /* 전국 전체 버튼 */
  .nation-btn{display:flex;align-items:center;justify-content:space-between;padding:9px 10px;border-radius:7px;cursor:pointer;border:1px solid var(--border);margin-bottom:8px;background:var(--card2);transition:all .13s;}
  .nation-btn:hover,.nation-btn.active{border-color:var(--accent);background:rgba(79,110,247,.1);}
  .nation-btn .nb-label{font-size:.85rem;font-weight:600;}
  .nation-btn .nb-avg{font-size:.9rem;font-weight:700;color:var(--accent);}

  /* 차트 */
  .chart-panel{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:14px;}
  .panel-title{font-size:.78rem;font-weight:600;color:var(--muted);margin-bottom:10px;}
  .chart-wrap{position:relative;height:190px;}

  /* 2컬럼 */
  .two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;}
  @media(max-width:580px){.two-col{grid-template-columns:1fr;}}
  .panel{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;}

  .ci{display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);cursor:pointer;}
  .ci:last-child{border-bottom:none;}
  .ci:hover .ci-name{color:var(--accent);}
  .ci-name{font-size:.83rem;}
  .ci-avg{font-size:.85rem;font-weight:600;color:var(--accent);}
  .ci-cnt{font-size:.68rem;color:var(--muted);}
  .rank{font-size:.68rem;color:var(--muted);width:16px;flex-shrink:0;}

  .loading{text-align:center;padding:50px;color:var(--muted);font-size:.88rem;}

  /* 호텔 목록 */
  .hotel-section{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;}
  @media(max-width:580px){.hotel-section{grid-template-columns:1fr;}}
  .hotel-item{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border);}
  .hotel-item:last-child{border-bottom:none;}
  .hotel-name{font-size:.82rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:200px;}
  .hotel-price{font-size:.85rem;font-weight:700;flex-shrink:0;margin-left:8px;}
  .hotel-plat{font-size:.66rem;color:var(--muted);flex-shrink:0;}
  .hotel-rank{font-size:.68rem;color:var(--muted);width:16px;flex-shrink:0;}
</style>
</head>
<body>

<header>
  <h1>🏨 전국 숙박 <span>객단가</span> 모니터링</h1>
  <div class="update-info">
    <span class="status-dot" id="statusDot"></span>
    <span id="updateTime">로딩 중...</span> · 매 시간 갱신
  </div>
</header>

<div class="container">
  <div class="offline-banner" id="offlineBanner">⚠️ 마지막 갱신이 2시간 이상 지났습니다.</div>
  <div id="mainContent" class="loading">데이터를 불러오는 중...</div>
</div>

<script>
const DATA_URL='https://raw.githubusercontent.com/okipxokipx-code/accommodation-price-monitor/main/data-export/latest.json';
const TYPE_LABELS={motel:'모텔',hotel:'호텔',pension:'펜션',guesthouse:'게스트하우스'};
const PLAT_LABELS={all:'전체',yanolja:'야놀자',yeogi:'여기어때'};
const CHART_COLORS={
  yanolja:{line:'#4f6ef7',fill:'rgba(79,110,247,.12)'},
  yeogi:  {line:'#f76f4f',fill:'rgba(247,111,79,.12)'},
  all:    {line:'#7986cb',fill:'rgba(121,134,203,.12)'},
};

let gData=null, gType='motel', gPlat='all', gCity='전국', gDistrict=null, trendChart=null;

const won=v=>v?Math.round(v).toLocaleString('ko-KR')+'원':'-';
const cnt=v=>v?v.toLocaleString('ko-KR')+'건':'-';

// ── 메인 렌더 ─────────────────────────────────────────────
function render(){
  if(!gData) return;
  const d=gData.types[gType];

  // 현재 선택 상태에 따른 통계
  let stats, trend, title;
  if(gCity==='전국'){
    stats=d.platforms[gPlat];
    trend=d.hourlyTrend;
    title='전국 전체';
  } else if(gDistrict){
    const cObj=d.cities.find(c=>c.city===gCity);
    const dObj=cObj?.districts?.find(dd=>dd.district===gDistrict);
    stats=getStats(dObj, gPlat);
    trend=dObj?.trend||[];
    title=`${gCity} · ${gDistrict}`;
  } else {
    const cObj=d.cities.find(c=>c.city===gCity);
    stats=getStats(cObj, gPlat);
    trend=cObj?.trend||[];
    title=gCity+' 전체';
  }

  document.getElementById('mainContent').innerHTML=`
    <!-- 숙박 유형 탭 -->
    <div class="type-tabs">
      ${Object.entries(TYPE_LABELS).map(([k,v])=>
        `<div class="type-tab ${k===gType?'active':''}" onclick="setType('${k}')">${v}</div>`
      ).join('')}
    </div>

    <!-- 플랫폼 탭 -->
    <div class="plat-tabs">
      ${Object.entries(PLAT_LABELS).map(([k,v])=>
        `<div class="plat-tab ${k===gPlat?'active':''}" onclick="setPlat('${k}')">${v}</div>`
      ).join('')}
    </div>

    <!-- 요약 카드 -->
    <div class="stats-row">
      <div class="stat-card hl">
        <div class="stat-label">📍 ${title}</div>
        <div class="stat-value">${won(stats?.avg)}</div>
        <div class="stat-sub">수집 ${cnt(stats?.count)}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">최저가</div>
        <div class="stat-value" style="color:var(--green);font-size:1.15rem">${won(stats?.min)}</div>
        <div class="stat-sub">해당 지역 기준</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">최고가</div>
        <div class="stat-value" style="color:var(--red);font-size:1.15rem">${won(stats?.max)}</div>
        <div class="stat-sub">해당 지역 기준</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">수집 플랫폼</div>
        <div style="margin-top:4px;display:flex;flex-direction:column;gap:4px">
          ${renderPlatStats(gCity==='전국'?d.platforms:d.cities.find(c=>c.city===gCity)?.districts?.find(dd=>dd.district===gDistrict)||d.cities.find(c=>c.city===gCity))}
        </div>
      </div>
    </div>

    <!-- 지역 선택 패널 -->
    <div class="region-panel">
      <!-- 좌: 시/도 -->
      <div class="city-list">
        <div class="city-list-item ${'전국'===gCity?'active':''}" onclick="selectCity('전국')">전국 전체</div>
        ${d.cities.map(c=>
          `<div class="city-list-item ${c.city===gCity?'active':''}" onclick="selectCity('${c.city}')">${c.city}</div>`
        ).join('')}
      </div>

      <!-- 우: 구 단위 -->
      <div class="district-panel">
        ${renderDistrictPanel(d)}
      </div>
    </div>

    <!-- 트렌드 차트 -->
    <div class="chart-panel">
      <div class="panel-title">📈 24시간 트렌드 — ${title}</div>
      <div class="chart-wrap"><canvas id="trendChart"></canvas></div>
    </div>

    <!-- 도시 or 구 선택 시: 호텔 Top/Bottom 목록 -->
    ${gCity !== '전국' ? renderHotelLists(d) : ''}

    <!-- 전국 뷰일 때: 비싼/저렴 TOP10 -->
    ${gCity==='전국'?`
    <div class="two-col">
      <div class="panel">
        <div class="panel-title">💰 비싼 지역 TOP 10</div>
        ${topDistricts(d,'desc')}
      </div>
      <div class="panel">
        <div class="panel-title">💸 저렴한 지역 TOP 10</div>
        ${topDistricts(d,'asc')}
      </div>
    </div>`:''}
  `;

  renderChart(trend);
}

// 플랫폼별 통계 렌더
function renderPlatStats(obj){
  if(!obj) return '';
  const p=obj.platforms||{};
  return ['yanolja','yeogi'].filter(k=>p[k]).map(k=>`
    <div style="display:flex;justify-content:space-between;align-items:center">
      <span style="font-size:.7rem;color:var(--muted)">${PLAT_LABELS[k]}</span>
      <span style="font-size:.78rem;font-weight:600;color:${k==='yanolja'?'#4f6ef7':'#f76f4f'}">${won(p[k].avg)}</span>
    </div>
  `).join('');
}

// 구 패널 렌더
function renderDistrictPanel(d){
  if(gCity==='전국'){
    return `<div class="district-header">시/도를 선택하면 세부 지역이 표시됩니다</div>
      <div class="nation-btn active">
        <span class="nb-label">📊 전국 전체</span>
        <div><div class="nb-avg">${won(d.platforms.all?.avg)}</div><div class="ci-cnt">${cnt(d.platforms.all?.count)}</div></div>
      </div>
      ${d.cities.map(c=>`
        <div class="nation-btn" onclick="selectCity('${c.city}')">
          <span class="nb-label">${c.city}</span>
          <div><div class="nb-avg">${won(c.avg)}</div><div class="ci-cnt">${cnt(c.count)}</div></div>
        </div>
      `).join('')}`;
  }

  const cObj=d.cities.find(c=>c.city===gCity);
  if(!cObj||!cObj.districts?.length){
    return `<div class="district-header">수집된 세부 지역 없음</div>`;
  }

  return `
    <div class="district-header">${gCity} 세부 지역 (${cObj.districts.length}개)</div>
    <div class="district-item ${!gDistrict?'active':''}" onclick="selectDistrict(null)">
      <div class="district-name">${gCity} 전체<small>모든 구 통합</small></div>
      <div style="text-align:right">
        <div class="district-avg">${won(cObj.avg)}</div>
        <div class="district-count">${cnt(cObj.count)}</div>
      </div>
    </div>
    ${cObj.districts.map(dd=>`
      <div class="district-item ${dd.district===gDistrict?'active':''}" onclick="selectDistrict('${dd.district.replace(/'/g,"\\'")}')">
        <div class="district-name">${dd.district}</div>
        <div style="text-align:right">
          <div class="district-avg">${won(dd.avg)}</div>
          <div class="district-count">${cnt(dd.count)}</div>
        </div>
      </div>
    `).join('')}
  `;
}

// 호텔 Top/Bottom 목록 렌더
function renderHotelLists(d){
  const cObj=d.cities.find(c=>c.city===gCity);
  if(!cObj) return '';
  // 구 선택 시 → 구 데이터 / 도시만 선택 시 → 도시 통합 데이터
  const dObj=gDistrict ? cObj?.districts?.find(dd=>dd.district===gDistrict) : null;
  const src=dObj || cObj;
  const top=src?.top5||[], bot=src?.bottom5||[];
  if(!top.length && !bot.length) return '';
  const platColor=p=>p==='yanolja'?'#4f6ef7':'#f76f4f';
  const hotelItem=(h,i)=>`
    <div class="hotel-item">
      <div style="display:flex;align-items:center;gap:4px;min-width:0">
        <span class="hotel-rank">${i+1}</span>
        <span class="hotel-name" title="${h.hotel_name}">${h.hotel_name}</span>
      </div>
      <div style="display:flex;align-items:center;gap:6px;flex-shrink:0">
        <span class="hotel-plat" style="color:${platColor(h.platform)}">${PLAT_LABELS[h.platform]||h.platform}</span>
        <span class="hotel-price" style="color:${top.includes(h)?'var(--red)':'var(--green)'}">${won(h.price)}</span>
      </div>
    </div>`;
  return `
    <div class="hotel-section">
      <div class="panel">
        <div class="panel-title">💰 비싼 숙소 TOP ${top.length}</div>
        ${top.map((h,i)=>hotelItem(h,i)).join('')}
      </div>
      <div class="panel">
        <div class="panel-title">💸 저렴한 숙소 TOP ${bot.length}</div>
        ${bot.map((h,i)=>hotelItem(h,i)).join('')}
      </div>
    </div>`;
}

// 전국 TOP 지역 (구 단위)
function topDistricts(d, dir){
  const all=[];
  d.cities.forEach(c=>c.districts?.forEach(dd=>all.push({...dd,cityLabel:c.city})));
  const sorted=all.filter(x=>x.avg).sort((a,b)=>dir==='desc'?b.avg-a.avg:a.avg-b.avg).slice(0,10);
  if(!sorted.length) return '<div style="color:var(--muted);font-size:.82rem;padding:5px">데이터 없음</div>';
  return sorted.map((x,i)=>`
    <div class="ci" onclick="selectCity('${x.city}');selectDistrict('${x.district.replace(/'/g,"\\'")}')">
      <div style="display:flex;align-items:center;gap:5px">
        <span class="rank">${i+1}</span>
        <span class="ci-name">${x.cityLabel} ${x.district}</span>
      </div>
      <div style="text-align:right">
        <div class="ci-avg">${won(x.avg)}</div>
        <div class="ci-cnt">${cnt(x.count)}</div>
      </div>
    </div>
  `).join('');
}

function getStats(obj, plat){
  if(!obj) return {avg:null,count:0,min:null,max:null};
  if(plat==='all') return obj;
  const p=obj.platforms?.[plat];
  return {avg:p?.avg,count:p?.count,min:obj.min,max:obj.max};
}

function renderChart(rows){
  const ctx=document.getElementById('trendChart');
  if(!ctx) return;
  if(trendChart){trendChart.destroy();trendChart=null;}
  if(!rows?.length){
    ctx.parentElement.innerHTML+='<div style="text-align:center;padding:28px;color:var(--muted);font-size:.8rem">트렌드 데이터 없음</div>';
    return;
  }
  const platMap={};
  rows.forEach(r=>{
    if(!platMap[r.platform]) platMap[r.platform]={};
    platMap[r.platform][r.hour]=r.avg;
  });
  const allHours=[...new Set(rows.map(r=>r.hour))].sort();
  const labels=allHours.map(h=>h.slice(11,16));
  const datasets=Object.keys(platMap).map(plat=>({
    label:PLAT_LABELS[plat]||plat,
    data:allHours.map(h=>platMap[plat][h]||null),
    borderColor:CHART_COLORS[plat]?.line||'#7986cb',
    backgroundColor:CHART_COLORS[plat]?.fill||'rgba(121,134,203,.1)',
    fill:true,tension:.4,pointRadius:3,spanGaps:false,
  }));
  trendChart=new Chart(ctx,{
    type:'line',data:{labels,datasets},
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{
        legend:{labels:{color:'#7986cb',font:{size:11}}},
        tooltip:{callbacks:{label:c=>` ${c.dataset.label}: ${won(c.raw)}`}}
      },
      scales:{
        x:{ticks:{color:'#7986cb',font:{size:10}},grid:{color:'#2e3250'}},
        y:{ticks:{color:'#7986cb',font:{size:10},callback:v=>(v/10000).toFixed(0)+'만'},grid:{color:'#2e3250'}}
      }
    }
  });
}

function setType(t){gType=t;gCity='전국';gDistrict=null;render();}
function setPlat(p){gPlat=p;render();}
function selectCity(c){gCity=c;gDistrict=null;render();}
function selectDistrict(d){gDistrict=d;render();}

// ── 데이터 로드 ─────────────────────────────────────────────
async function loadData(){
  try{
    const res=await fetch(DATA_URL+'?t='+Date.now());
    if(!res.ok) throw new Error('HTTP '+res.status);
    gData=await res.json();
    const ua=new Date(gData.updatedAt);
    const diff=Math.round((Date.now()-ua)/60000);
    const ts=ua.toLocaleString('ko-KR',{timeZone:'Asia/Seoul',month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'});
    document.getElementById('statusDot').classList.toggle('stale',diff>120);
    document.getElementById('offlineBanner').style.display=diff>120?'block':'none';
    document.getElementById('updateTime').textContent=`마지막 갱신: ${ts} (${diff<60?diff+'분 전':Math.floor(diff/60)+'시간 전'})`;
    render();
  }catch(err){
    document.getElementById('mainContent').innerHTML=`
      <div style="text-align:center;padding:50px;color:var(--red)">
        <div style="font-size:1.6rem;margin-bottom:8px">⚠️</div>
        <div>데이터를 불러오지 못했습니다</div>
        <div style="font-size:.75rem;color:var(--muted);margin-top:5px">${err.message}</div>
        <button onclick="loadData()" style="margin-top:12px;padding:7px 16px;background:var(--accent);color:#fff;border:none;border-radius:8px;cursor:pointer">다시 시도</button>
      </div>`;
  }
}
loadData();
