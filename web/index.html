<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>전국 숙박 객단가 모니터링</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root {
  --bg: #0f1117; --card: #1a1d27; --card2: #22263a;
  --border: #2e3250; --accent: #4f6ef7;
  --text: #e8eaf6; --muted: #7986cb;
  --green: #4caf50; --red: #f44336; --orange: #ffc107;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; }

/* 헤더 */
header {
  background: var(--card); border-bottom: 1px solid var(--border);
  padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px;
}
header h1 { font-size: 1rem; font-weight: 700; }
header h1 em { color: var(--accent); font-style: normal; }
.upd { font-size: .73rem; color: var(--muted); }
.dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: var(--green); margin-right: 5px; vertical-align: middle; }
.dot.stale { background: var(--red); animation: blink 1.4s infinite; }
@keyframes blink { 0%,100%{opacity:1}50%{opacity:.3} }

.wrap { max-width: 960px; margin: 0 auto; padding: 16px; }
@media(max-width:600px){ .wrap { padding: 0; } }

/* ── 버튼/탭 공통 패딩 래퍼 ── */
@media(max-width:600px){
  .type-row, .plat-row, .region-bar, .district-wrap { margin-left: 0; margin-right: 0; }
}

/* 숙박 유형 탭 - 2×2 그리드 */
.type-row { display: grid; grid-template-columns: repeat(4,1fr); gap: 6px; margin-bottom: 10px; }
@media(max-width:600px){
  .type-row { grid-template-columns: repeat(2,1fr); gap: 3px; margin-bottom: 3px; }
}
.type-btn {
  padding: 10px 4px; border-radius: 10px; border: 1px solid var(--border);
  background: var(--card); cursor: pointer; font-size: .88rem; color: var(--muted);
  transition: all .15s; text-align: center; font-weight: 500;
}
@media(max-width:600px){
  .type-btn { padding: 16px 4px; font-size: 1.1rem; border-radius: 0; border: none; border-bottom: 3px solid transparent; background: var(--card2); }
  .type-btn.on { background: var(--accent); border-bottom-color: var(--accent); }
}
.type-btn.on { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 700; }

/* 플랫폼 탭 - 3등분 */
.plat-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 6px; margin-bottom: 12px; }
@media(max-width:600px){ .plat-row { gap: 0; margin-bottom: 3px; } }
.plat-btn {
  padding: 7px 4px; border-radius: 8px; border: 1px solid var(--border);
  background: transparent; cursor: pointer; font-size: .82rem; color: var(--muted);
  transition: all .15s; text-align: center;
}
@media(max-width:600px){
  .plat-btn { padding: 14px 4px; font-size: 1rem; border-radius: 0; border: none; border-bottom: 3px solid transparent; background: var(--card); }
  .plat-btn.on { border-bottom-color: var(--accent); color: var(--accent); background: var(--card); font-weight: 700; }
}
.plat-btn.on { border-color: var(--accent); color: var(--accent); background: rgba(79,110,247,.1); font-weight: 600; }

/* 지역 선택 - 줄바꿈 */
.region-bar { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
@media(max-width:600px){ .region-bar { gap: 6px; padding: 10px 10px; margin-bottom: 0; background: var(--bg); } }
.region-pill {
  padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border);
  background: var(--card); cursor: pointer; font-size: .82rem; color: var(--muted);
  white-space: nowrap; transition: all .13s;
}
@media(max-width:600px){ .region-pill { font-size: 1rem; padding: 8px 16px; } }
.region-pill:hover { border-color: var(--accent); color: var(--text); }
.region-pill.on { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 700; }

/* 메인 통계 3칸 */
.stat3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 16px; }
.stat-box { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; }
.stat-box.hl { border-color: var(--accent); background: linear-gradient(135deg,#1a1d27,#1e2240); }
.stat-lbl { font-size: .7rem; color: var(--muted); margin-bottom: 5px; }
.stat-val { font-size: 1.45rem; font-weight: 700; }
.stat-sub { font-size: .68rem; color: var(--muted); margin-top: 4px; }

@media(max-width:600px){
  .stat3 { grid-template-columns: 1fr; gap: 2px; margin: 6px 0; }
  .stat-box { border-radius: 0; border-left: none; border-right: none; padding: 20px 16px; }
  .stat-lbl { font-size: 1rem; margin-bottom: 8px; }
  .stat-val { font-size: 2.4rem; }
  .stat-sub { font-size: .9rem; margin-top: 6px; }
}

/* Top3 섹션 */
.top3-wrap { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
@media(max-width:600px){ .top3-wrap { grid-template-columns: 1fr; gap: 2px; margin-bottom: 0; } }
.top3-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 14px; }
@media(max-width:600px){ .top3-card { border-radius: 0; border-left: none; border-right: none; padding: 16px; } }
.top3-head { font-size: .75rem; font-weight: 700; margin-bottom: 9px; letter-spacing: .03em; }
@media(max-width:600px){ .top3-head { font-size: 1rem; margin-bottom: 12px; } }
.top3-item { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); }
.top3-item:last-child { border-bottom: none; }
.badge {
  width: 26px; height: 26px; border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center; font-size: .72rem; font-weight: 700;
}
@media(max-width:600px){ .badge { width: 32px; height: 32px; font-size: .9rem; } }
.badge.exp { background: rgba(244,67,54,.15); color: var(--red); }
.badge.chp { background: rgba(76,175,80,.15); color: var(--green); }
.hotel-info { flex: 1; min-width: 0; }
.hotel-nm { font-size: .85rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.hotel-pl { font-size: .66rem; color: var(--muted); margin-top: 2px; }
.hotel-pr { font-size: .9rem; font-weight: 700; flex-shrink: 0; }
@media(max-width:600px){
  .hotel-nm { font-size: 1.05rem; }
  .hotel-pl { font-size: .85rem; margin-top: 4px; }
  .hotel-pr { font-size: 1.1rem; }
}

/* 24h 차트 */
.chart-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 14px; margin-bottom: 16px; }
@media(max-width:600px){ .chart-card { border-radius: 0; border-left: none; border-right: none; margin: 6px 0; } }
.sec-title { font-size: .75rem; font-weight: 600; color: var(--muted); margin-bottom: 10px; }
@media(max-width:600px){ .sec-title { font-size: .95rem; } }
.chart-box { position: relative; height: 180px; }
@media(max-width:600px){ .chart-box { height: 170px; } }

/* 전국 도시 그리드 */
.city-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px,1fr)); gap: 7px; }
@media(max-width:600px){ .city-grid { grid-template-columns: repeat(2,1fr); gap: 2px; } }
.city-card {
  background: var(--card2); border: 1px solid var(--border); border-radius: 8px;
  padding: 10px 12px; cursor: pointer; transition: border-color .13s; text-align: center;
}
@media(max-width:600px){ .city-card { border-radius: 0; border-left: none; border-right: none; padding: 16px 12px; } }
.city-card:hover, .city-card.on { border-color: var(--accent); background: rgba(79,110,247,.1); }
.city-nm { font-size: .72rem; color: var(--muted); margin-bottom: 3px; }
.city-avg { font-size: .95rem; font-weight: 700; }
.city-cnt { font-size: .65rem; color: var(--muted); margin-top: 2px; }
@media(max-width:600px){
  .city-nm { font-size: .95rem; margin-bottom: 6px; }
  .city-avg { font-size: 1.3rem; }
  .city-cnt { font-size: .82rem; margin-top: 4px; }
}

/* 구 선택 */
.district-wrap { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; margin-bottom: 12px; }
@media(max-width:600px){ .district-wrap { border-radius: 0; border-left: none; border-right: none; padding: 12px 10px; margin-bottom: 0; } }
.district-title { font-size: .72rem; color: var(--muted); font-weight: 600; margin-bottom: 8px; }
@media(max-width:600px){ .district-title { font-size: .95rem; } }
.district-pills { display: flex; gap: 6px; flex-wrap: wrap; }
.dist-pill {
  padding: 6px 13px; border-radius: 8px; border: 1px solid var(--border);
  background: transparent; cursor: pointer; font-size: .78rem; color: var(--muted); transition: all .13s; white-space: nowrap;
}
@media(max-width:600px){ .dist-pill { font-size: 1rem; padding: 9px 14px; } }
.dist-pill:hover { border-color: var(--accent); color: var(--text); }
.dist-pill.on { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 700; }

.empty { text-align: center; padding: 40px; color: var(--muted); font-size: .88rem; }
.loading { text-align: center; padding: 60px; color: var(--muted); }
</style>
</head>
<body>

<header>
  <h1>🏨 전국 숙박 <em>객단가</em> 모니터링</h1>
  <div class="upd"><span class="dot" id="dot"></span><span id="upd">로딩 중...</span> · 매 시간 갱신</div>
</header>

<div class="wrap">
  <div id="app" class="loading">데이터 불러오는 중...</div>
</div>

<script>
const DATA_URL = 'https://raw.githubusercontent.com/okipxokipx-code/accommodation-price-monitor/main/data-export/latest.json';
const TYPE_LBL = { motel:'모텔', hotel:'호텔', pension:'펜션', guesthouse:'게스트하우스' };
const PLAT_LBL = { all:'전체', yanolja:'야놀자', yeogi:'여기어때' };
const PLAT_CLR = { yanolja:'#4f6ef7', yeogi:'#f76f4f', all:'#7986cb' };
const PLAT_FILL = { yanolja:'rgba(79,110,247,.12)', yeogi:'rgba(247,111,79,.12)', all:'rgba(121,134,203,.12)' };

let D = null;
let gType = 'motel', gPlat = 'all', gCity = '전국', gDist = null;
let chart = null;

const won = v => v ? Math.round(v).toLocaleString('ko-KR') + '원' : '-';
const cnt = v => v ? v.toLocaleString('ko-KR') + '건' : '-';
const pc  = p => PLAT_CLR[p] || '#7986cb';

// ── 렌더 ────────────────────────────────────────────────────
function render() {
  if (!D) return;
  const td = D.types[gType];
  if (!td) return;

  // 현재 선택 소스
  const cityObj = td.cities.find(c => c.city === gCity);
  const distObj = gDist ? cityObj?.districts?.find(d => d.district === gDist) : null;
  const src     = distObj || cityObj;    // null 이면 전국 뷰
  const isNation = !src;

  // 통계 (플랫폼 필터 적용)
  const stats = isNation
    ? td.platforms[gPlat]
    : (gPlat === 'all' ? src : { avg: src.platforms?.[gPlat]?.avg, count: src.platforms?.[gPlat]?.count, min: src.min, max: src.max });

  const top3 = src?.top3   || [];
  const bot3 = src?.bottom3 || [];
  const trend = src?.trend  || td.hourlyTrend;
  const titleLoc = distObj ? `${gCity} · ${gDist}` : gCity === '전국' ? '전국 전체' : gCity;

  document.getElementById('app').innerHTML = `
    <!-- 숙박 유형 탭 -->
    <div class="type-row">
      ${Object.entries(TYPE_LBL).map(([k,v]) =>
        `<div class="type-btn ${k===gType?'on':''}" onclick="setType('${k}')">${v}</div>`
      ).join('')}
    </div>

    <!-- 플랫폼 탭 -->
    <div class="plat-row">
      ${Object.entries(PLAT_LBL).map(([k,v]) =>
        `<div class="plat-btn ${k===gPlat?'on':''}" onclick="setPlat('${k}')">${v}</div>`
      ).join('')}
    </div>

    <!-- 지역 선택 바 -->
    <div class="region-bar">
      <div class="region-pill ${'전국'===gCity?'on':''}" onclick="setCity('전국')">📊 전국 전체</div>
      ${td.cities.map(c =>
        `<div class="region-pill ${c.city===gCity?'on':''}" onclick="setCity('${c.city}')">${c.city}</div>`
      ).join('')}
    </div>

    <!-- 구 단위 선택 (도시 선택 시) -->
    ${cityObj ? `
    <div class="district-wrap">
      <div class="district-title">📍 ${gCity} 세부 지역</div>
      <div class="district-pills">
        <div class="dist-pill ${!gDist?'on':''}" onclick="setDist(null)">${gCity} 전체</div>
        ${(cityObj.districts||[]).map(d =>
          `<div class="dist-pill ${d.district===gDist?'on':''}" onclick="setDist('${d.district.replace(/'/g,"\\'")}')">${d.district}</div>`
        ).join('')}
      </div>
    </div>` : ''}

    <!-- 핵심 통계 3칸 -->
    <div class="stat3">
      <div class="stat-box hl">
        <div class="stat-lbl">📍 ${titleLoc} 평균 객단가</div>
        <div class="stat-val" style="color:var(--accent)">${won(stats?.avg)}</div>
        <div class="stat-sub">수집 ${cnt(stats?.count)}</div>
      </div>
      <div class="stat-box">
        <div class="stat-lbl">🔴 최고가</div>
        <div class="stat-val" style="color:var(--red)">${won(stats?.max)}</div>
        ${(() => {
          const h = isNation ? stats?.topHotel : top3[0];
          if (!h) return '<div class="stat-sub">데이터 없음</div>';
          const loc = h.city ? (h.district && h.district !== h.city ? `${h.city} ${h.district}` : h.city) : '';
          return `<div style="margin-top:6px;font-size:.8rem;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="${h.hotel_name}">${h.hotel_name}</div>
          <div style="font-size:.7rem;color:var(--muted);margin-top:2px">${loc ? loc + ' · ' : ''}<span style="color:${pc(h.platform)}">${PLAT_LBL[h.platform]||h.platform}</span></div>`;
        })()}
      </div>
      <div class="stat-box">
        <div class="stat-lbl">🟢 최저가</div>
        <div class="stat-val" style="color:var(--green)">${won(stats?.min)}</div>
        ${(() => {
          const h = isNation ? stats?.botHotel : bot3[0];
          if (!h) return '<div class="stat-sub">데이터 없음</div>';
          const loc = h.city ? (h.district && h.district !== h.city ? `${h.city} ${h.district}` : h.city) : '';
          return `<div style="margin-top:6px;font-size:.8rem;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="${h.hotel_name}">${h.hotel_name}</div>
          <div style="font-size:.7rem;color:var(--muted);margin-top:2px">${loc ? loc + ' · ' : ''}<span style="color:${pc(h.platform)}">${PLAT_LBL[h.platform]||h.platform}</span></div>`;
        })()}
      </div>
    </div>

    <!-- Top3 / Bottom3 (항상 표시) -->
    ${(() => {
      // 전국: 모든 도시 top3/bottom3 풀을 합쳐 전국 순위 도출
      const fullTop3 = isNation
        ? td.cities.flatMap(c => (c.top3||[]))
            .sort((a,b) => b.price - a.price).slice(0,3)
        : top3;
      const fullBot3 = isNation
        ? td.cities.flatMap(c => (c.bottom3||[]))
            .sort((a,b) => a.price - b.price).slice(0,3)
        : bot3;
      if (!fullTop3.length && !fullBot3.length) return '';
      const hotelRow = (h, i, clr) => `
        <div class="top3-item">
          <div class="badge ${clr==='red'?'exp':'chp'}">${i+1}</div>
          <div class="hotel-info">
            <div class="hotel-nm" title="${h.hotel_name}">${h.hotel_name}</div>
            <div class="hotel-pl">${h.city?`<span style="color:var(--muted)">${h.city}</span> · `:''}<span style="color:${pc(h.platform)}">${PLAT_LBL[h.platform]||h.platform}</span></div>
          </div>
          <div class="hotel-pr" style="color:var(--${clr})">${won(h.price)}</div>
        </div>`;
      return `
    <div class="top3-wrap">
      <div class="top3-card">
        <div class="top3-head" style="color:var(--red)">💰 최고가 TOP 3</div>
        ${fullTop3.length ? fullTop3.map((h,i)=>hotelRow(h,i,'red')).join('') : '<div class="empty">데이터 없음</div>'}
      </div>
      <div class="top3-card">
        <div class="top3-head" style="color:var(--green)">💸 최저가 TOP 3</div>
        ${fullBot3.length ? fullBot3.map((h,i)=>hotelRow(h,i,'green')).join('') : '<div class="empty">데이터 없음</div>'}
      </div>
    </div>`;
    })()}

    <!-- 24시간 트렌드 차트 -->
    <div class="chart-card">
      <div class="sec-title">📈 24시간 객단가 트렌드 — ${titleLoc}</div>
      <div class="chart-box"><canvas id="chart"></canvas></div>
    </div>

    <!-- 전국 뷰: 도시 그리드 -->
    ${isNation ? `
    <div class="chart-card">
      <div class="sec-title">🗺️ 전국 도시별 평균 객단가 — ${TYPE_LBL[gType]}</div>
      <div class="city-grid">
        ${td.cities.map(c => `
          <div class="city-card ${c.city===gCity?'on':''}" onclick="setCity('${c.city}')">
            <div class="city-nm">${c.city}</div>
            <div class="city-avg">${won(c.avg)}</div>
            <div class="city-cnt">${cnt(c.count)}</div>
          </div>`).join('')}
      </div>
    </div>` : ''}
  `;

  drawChart(trend);
}

// ── 차트 ────────────────────────────────────────────────────
function drawChart(rows) {
  const ctx = document.getElementById('chart');
  if (!ctx) return;
  if (chart) { chart.destroy(); chart = null; }
  if (!rows?.length) return;

  const byPlat = {};
  rows.forEach(r => {
    if (!byPlat[r.platform]) byPlat[r.platform] = {};
    byPlat[r.platform][r.hour] = r.avg;
  });
  const hours = [...new Set(rows.map(r => r.hour))].sort();
  const labels = hours.map(h => h.slice(11, 16));

  chart = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: Object.keys(byPlat).map(p => ({
        label: PLAT_LBL[p] || p,
        data: hours.map(h => byPlat[p][h] || null),
        borderColor: PLAT_CLR[p] || '#7986cb',
        backgroundColor: PLAT_FILL[p] || 'rgba(121,134,203,.1)',
        fill: true, tension: .4, pointRadius: 3, spanGaps: false,
      }))
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { labels: { color: '#7986cb', font: { size: 11 } } },
        tooltip: { callbacks: { label: c => ` ${c.dataset.label}: ${won(c.raw)}` } }
      },
      scales: {
        x: { ticks: { color:'#7986cb', font:{size:10} }, grid: { color:'#2e3250' } },
        y: { ticks: { color:'#7986cb', font:{size:10}, callback: v => (v/10000).toFixed(0)+'만' }, grid: { color:'#2e3250' } }
      }
    }
  });
}

// ── 이벤트 ───────────────────────────────────────────────────
function setType(t) { gType = t; gCity = '전국'; gDist = null; render(); }
function setPlat(p) { gPlat = p; render(); }
function setCity(c) { gCity = c; gDist = null; render(); }
function setDist(d)  { gDist = d; render(); }

// ── 데이터 로드 ──────────────────────────────────────────────
async function load() {
  try {
    const res = await fetch(DATA_URL + '?_=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    D = await res.json();

    const ua = new Date(D.updatedAt);
    const diff = Math.round((Date.now() - ua) / 60000);
    const ts = ua.toLocaleString('ko-KR', { timeZone:'Asia/Seoul', month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit' });
    const stale = diff > 120;
    document.getElementById('dot').classList.toggle('stale', stale);
    document.getElementById('upd').textContent = `${ts} 갱신 (${diff < 60 ? diff+'분 전' : Math.floor(diff/60)+'시간 전'})`;

    render();
  } catch(e) {
    document.getElementById('app').innerHTML = `
      <div style="text-align:center;padding:60px;color:var(--red)">
        ⚠️ 데이터 로드 실패<br>
        <small style="color:var(--muted)">${e.message}</small><br>
        <button onclick="load()" style="margin-top:14px;padding:8px 20px;background:var(--accent);color:#fff;border:none;border-radius:8px;cursor:pointer">다시 시도</button>
      </div>`;
  }
}

load();
setInterval(load, 5 * 60 * 1000);
</script>
