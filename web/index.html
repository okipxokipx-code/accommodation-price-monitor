<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>전국 숙박 객단가 모니터링</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d27;
    --card2: #22263a;
    --border: #2e3250;
    --accent: #4f6ef7;
    --accent2: #f76f4f;
    --text: #e8eaf6;
    --muted: #7986cb;
    --green: #4caf50;
    --red: #f44336;
    --yellow: #ffc107;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Pretendard', 'Apple SD Gothic Neo', sans-serif; min-height: 100vh; }

  header { background: var(--card); border-bottom: 1px solid var(--border); padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
  header h1 { font-size: 1.1rem; font-weight: 700; }
  header h1 span { color: var(--accent); }
  .update-info { font-size: 0.78rem; color: var(--muted); }
  .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; background: var(--green); }
  .status-dot.stale { background: var(--red); animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100% { opacity:1 } 50% { opacity:0.4 } }

  .container { max-width: 1200px; margin: 0 auto; padding: 20px 16px; }

  /* 숙박 유형 탭 */
  .type-tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
  .type-tab { padding: 8px 20px; border-radius: 24px; border: 1px solid var(--border); background: var(--card); cursor: pointer; font-size: 0.9rem; color: var(--muted); transition: all 0.2s; }
  .type-tab:hover { border-color: var(--accent); color: var(--text); }
  .type-tab.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }

  /* 플랫폼 탭 */
  .plat-tabs { display: flex; gap: 6px; margin-bottom: 20px; }
  .plat-tab { padding: 5px 14px; border-radius: 16px; border: 1px solid var(--border); background: transparent; cursor: pointer; font-size: 0.82rem; color: var(--muted); transition: all 0.2s; }
  .plat-tab.active { border-color: var(--muted); color: var(--text); }

  /* 요약 카드 */
  .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 24px; }
  .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px 18px; }
  .stat-label { font-size: 0.75rem; color: var(--muted); margin-bottom: 6px; }
  .stat-value { font-size: 1.5rem; font-weight: 700; }
  .stat-sub { font-size: 0.75rem; color: var(--muted); margin-top: 4px; }
  .stat-card.highlight { border-color: var(--accent); background: linear-gradient(135deg, #1a1d27 0%, #1e2340 100%); }
  .stat-card.highlight .stat-value { color: var(--accent); }

  /* 그리드 */
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
  @media (max-width: 640px) { .two-col { grid-template-columns: 1fr; } }

  .panel { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 18px; }
  .panel-title { font-size: 0.85rem; font-weight: 600; color: var(--muted); margin-bottom: 14px; text-transform: uppercase; letter-spacing: 0.05em; }

  /* 도시 목록 */
  .city-item { display: flex; align-items: center; justify-content: space-between; padding: 7px 0; border-bottom: 1px solid var(--border); }
  .city-item:last-child { border-bottom: none; }
  .city-name { font-size: 0.88rem; }
  .city-avg { font-size: 0.9rem; font-weight: 600; color: var(--accent); }
  .city-count { font-size: 0.72rem; color: var(--muted); }
  .rank { font-size: 0.72rem; color: var(--muted); width: 20px; }

  /* 차트 */
  .chart-panel { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 18px; margin-bottom: 24px; }
  .chart-wrap { position: relative; height: 220px; }

  /* 전국 도시 그리드 */
  .city-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px; }
  .city-grid-card { background: var(--card2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; }
  .city-grid-name { font-size: 0.78rem; color: var(--muted); margin-bottom: 4px; }
  .city-grid-avg { font-size: 1rem; font-weight: 700; color: var(--text); }
  .city-grid-count { font-size: 0.7rem; color: var(--muted); }

  /* 오프라인 배너 */
  .offline-banner { background: #3a1a1a; border: 1px solid var(--red); border-radius: 8px; padding: 12px 16px; margin-bottom: 16px; font-size: 0.88rem; color: #ff7070; display: none; }
  .loading { text-align: center; padding: 60px; color: var(--muted); font-size: 0.9rem; }
</style>
</head>
<body>

<header>
  <h1>🏨 전국 숙박 <span>객단가</span> 모니터링</h1>
  <div class="update-info">
    <span class="status-dot" id="statusDot"></span>
    <span id="updateTime">데이터 로딩 중...</span>
    &nbsp;·&nbsp; 매 시간 자동 갱신
  </div>
</header>

<div class="container">
  <div class="offline-banner" id="offlineBanner">
    ⚠️ 마지막 갱신이 2시간 이상 지났습니다. 수집 서버를 확인해 주세요.
  </div>

  <div id="mainContent" class="loading">데이터를 불러오는 중...</div>
</div>

<script>
// ── 데이터 소스 ──────────────────────────────────────────────────
const DATA_URL = 'https://raw.githubusercontent.com/okipxokipx-code/accommodation-price-monitor/main/data-export/latest.json';

const TYPE_LABELS = { motel: '모텔', hotel: '호텔', pension: '펜션', guesthouse: '게스트하우스' };
const PLAT_LABELS = { all: '전체', yanolja: '야놀자', yeogi: '여기어때' };
const CHART_COLORS = {
  yanolja: { line: '#4f6ef7', fill: 'rgba(79,110,247,0.12)' },
  yeogi:   { line: '#f76f4f', fill: 'rgba(247,111,79,0.12)' },
  all:     { line: '#7986cb', fill: 'rgba(121,134,203,0.12)' },
};

let gData = null;
let gType = 'motel';
let gPlat = 'all';
let trendChart = null;

// ── 숫자 포맷 ─────────────────────────────────────────────────────
function won(v) {
  if (!v) return '-';
  return Math.round(v).toLocaleString('ko-KR') + '원';
}
function cnt(v) {
  if (!v) return '-';
  return v.toLocaleString('ko-KR') + '건';
}

// ── 메인 렌더 ─────────────────────────────────────────────────────
function render() {
  if (!gData) return;
  const d = gData.types[gType];
  const p = d.platforms[gPlat];

  document.getElementById('mainContent').innerHTML = `
    <!-- 유형 탭 -->
    <div class="type-tabs">
      ${Object.entries(TYPE_LABELS).map(([k,v]) =>
        `<div class="type-tab ${k===gType?'active':''}" onclick="setType('${k}')">${v}</div>`
      ).join('')}
    </div>

    <!-- 플랫폼 탭 -->
    <div class="plat-tabs">
      ${Object.entries(PLAT_LABELS).map(([k,v]) =>
        `<div class="plat-tab ${k===gPlat?'active':''}" onclick="setPlat('${k}')">${v}</div>`
      ).join('')}
    </div>

    <!-- 요약 카드 -->
    <div class="stats-row">
      <div class="stat-card highlight">
        <div class="stat-label">평균 객단가</div>
        <div class="stat-value">${won(p.avg)}</div>
        <div class="stat-sub">수집 ${cnt(p.count)}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">최저가</div>
        <div class="stat-value" style="color:#4caf50;font-size:1.3rem">${won(p.min)}</div>
        <div class="stat-sub">전국 기준</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">최고가</div>
        <div class="stat-value" style="color:#f44336;font-size:1.3rem">${won(p.max)}</div>
        <div class="stat-sub">전국 기준</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">수집 지역 수</div>
        <div class="stat-value" style="font-size:1.3rem">${d.cities.length}<span style="font-size:0.9rem;color:var(--muted)">개</span></div>
        <div class="stat-sub">최근 2시간 배치</div>
      </div>
    </div>

    <!-- 차트 -->
    <div class="chart-panel">
      <div class="panel-title">📈 24시간 객단가 트렌드</div>
      <div class="chart-wrap"><canvas id="trendChart"></canvas></div>
    </div>

    <!-- 상위/하위 도시 + 전국 도시 -->
    <div class="two-col">
      <div class="panel">
        <div class="panel-title">💰 비싼 지역 TOP 10</div>
        ${topCities(d.cities, 'desc')}
      </div>
      <div class="panel">
        <div class="panel-title">💸 저렴한 지역 TOP 10</div>
        ${topCities(d.cities, 'asc')}
      </div>
    </div>

    <!-- 전국 도시 그리드 -->
    <div class="panel" style="margin-bottom:24px">
      <div class="panel-title">🗺️ 전국 도시별 평균 객단가 (${TYPE_LABELS[gType]})</div>
      <div class="city-grid" style="margin-top:12px">
        ${d.cities.map(c => `
          <div class="city-grid-card">
            <div class="city-grid-name">${c.city}</div>
            <div class="city-grid-avg">${won(c.avg)}</div>
            <div class="city-grid-count">${cnt(c.count)}</div>
          </div>
        `).join('')}
      </div>
    </div>
  `;

  renderChart(d.hourlyTrend);
}

function topCities(cities, dir) {
  const sorted = [...cities].filter(c => c.avg).sort((a, b) => dir === 'desc' ? b.avg - a.avg : a.avg - b.avg).slice(0, 10);
  if (!sorted.length) return '<div style="color:var(--muted);font-size:0.85rem;padding:8px 0">데이터 없음</div>';
  return sorted.map((c, i) => `
    <div class="city-item">
      <div style="display:flex;align-items:center;gap:6px">
        <span class="rank">${i+1}</span>
        <span class="city-name">${c.city}</span>
      </div>
      <div style="text-align:right">
        <div class="city-avg">${won(c.avg)}</div>
        <div class="city-count">${cnt(c.count)}</div>
      </div>
    </div>
  `).join('');
}

function renderChart(hourlyTrend) {
  const ctx = document.getElementById('trendChart');
  if (!ctx) return;
  if (trendChart) { trendChart.destroy(); trendChart = null; }

  // 플랫폼별 데이터 분리
  const platMap = {};
  hourlyTrend.forEach(row => {
    if (!platMap[row.platform]) platMap[row.platform] = {};
    platMap[row.platform][row.hour] = row.avg;
  });

  // 시간 레이블
  const allHours = [...new Set(hourlyTrend.map(r => r.hour))].sort();
  const labels = allHours.map(h => h.slice(11, 16)); // HH:00

  const plats = Object.keys(platMap);
  const datasets = plats.map(plat => ({
    label: PLAT_LABELS[plat] || plat,
    data: allHours.map(h => platMap[plat][h] || null),
    borderColor: CHART_COLORS[plat]?.line || '#7986cb',
    backgroundColor: CHART_COLORS[plat]?.fill || 'rgba(121,134,203,0.1)',
    fill: true,
    tension: 0.4,
    pointRadius: 3,
    spanGaps: false,
  }));

  trendChart = new Chart(ctx, {
    type: 'line',
    data: { labels, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { labels: { color: '#7986cb', font: { size: 12 } } },
        tooltip: {
          callbacks: {
            label: ctx => ` ${ctx.dataset.label}: ${won(ctx.raw)}`,
          }
        }
      },
      scales: {
        x: { ticks: { color: '#7986cb', font: { size: 11 } }, grid: { color: '#2e3250' } },
        y: {
          ticks: { color: '#7986cb', font: { size: 11 }, callback: v => (v/10000).toFixed(0) + '만' },
          grid: { color: '#2e3250' },
        }
      }
    }
  });
}

function setType(t) { gType = t; render(); }
function setPlat(p) { gPlat = p; render(); }

// ── 데이터 로드 ─────────────────────────────────────────────────
async function loadData() {
  try {
    const res = await fetch(DATA_URL + '?t=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    gData = await res.json();

    // 갱신 시간 표시
    const updatedAt = new Date(gData.updatedAt);
    const diffMin = Math.round((Date.now() - updatedAt) / 60000);
    const timeStr = updatedAt.toLocaleString('ko-KR', { timeZone: 'Asia/Seoul', month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit' });

    if (diffMin > 120) {
      document.getElementById('statusDot').classList.add('stale');
      document.getElementById('offlineBanner').style.display = 'block';
    } else {
      document.getElementById('statusDot').classList.remove('stale');
      document.getElementById('offlineBanner').style.display = 'none';
    }
    document.getElementById('updateTime').textContent = `마지막 갱신: ${timeStr} (${diffMin < 60 ? diffMin + '분 전' : Math.floor(diffMin/60) + '시간 전'})`;

    render();
  } catch (err) {
    document.getElementById('mainContent').innerHTML = `
      <div style="text-align:center;padding:60px;color:#f44336">
        <div style="font-size:2rem;margin-bottom:12px">⚠️</div>
        <div>데이터를 불러오지 못했습니다</div>
        <div style="font-size:0.8rem;color:var(--muted);margin-top:8px">${err.message}</div>
        <button onclick="loadData()" style="margin-top:16px;padding:8px 20px;background:var(--accent);color:#fff;border:none;border-radius:8px;cursor:pointer">다시 시도</button>
      </div>`;
  }
}

// 5분마다 자동 새로고침
loadData();
setInterval(loadData, 5 * 60 * 1000);
</script>
</body>
</html>
